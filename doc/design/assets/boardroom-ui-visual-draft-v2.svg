      <stop offset="1" stop-color="#C4E4FF" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="branchGlow" x1="1120" y1="470" x2="1338" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E2C98E"/>
      <stop offset="1" stop-color="#C8A760"/>
    </linearGradient>
    <linearGradient id="softBlue" x1="0" y1="0" x2="0" y2="1">

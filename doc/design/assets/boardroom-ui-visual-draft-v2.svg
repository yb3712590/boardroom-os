  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1450" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A2331"/>
      <stop offset="0.58" stop-color="#0F1722"/>
      <stop offset="1" stop-color="#0A111B"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 100) rotate(20) scale(620 420)">

# 图书馆管理系统 PRD v1.0

## 1. 产品概述

面向高校的小型图书馆管理系统，支持图书借还、读者管理、馆藏维护等核心业务。

## 2. 用户角色

| 角色 | 描述 |
|------|------|
| 读者 | 检索图书、查看借阅记录、续借 |
| 馆员 | 处理借还、编目上架、罚款管理 |
| 系统管理员 | 用户管理、系统配置、数据统计 |

## 3. 功能模块

### 3.1 图书管理 (Librarian)

- 图书录入：ISBN 自动拉取书目信息（调用开放 API），支持手动补录
- 图书编目：分类号、索书号自动生成（中图法），支持馆藏地分配
- 图书下架/报损：标记遗失、损坏，记录原因
- 馆藏盘点：按馆藏地生成盘点单，支持扫码盘点

### 3.2 读者管理 (Librarian, Admin)

- 读者注册：学工号唯一标识，绑定院系/班级
- 读者类型：本科生(借10册30天)、研究生(借15册60天)、教师(借20册90天)
- 挂失/冻结：挂失后禁止借阅，管理员可冻结违规账号

### 3.3 借阅管理 (Librarian)

- 借书：扫描读者证 + 图书条码，校验借阅上限和逾期罚金
- 还书：扫描图书条码，自动计算超期天数，若逾期触发罚款
- 续借：读者自助续借一次（借期延长 50%），不可续借已预约图书
- 预约：已借出图书可预约，归还后保留 3 天，超时取消
- 超期罚款：0.1 元/册/天，馆员确认收款后清除欠费

### 3.4 检索系统 (All)

- 关键字检索（书名、作者、ISBN、分类号）
- 高级筛选（馆藏地、在馆状态、出版年份）
- 结果分页，显示馆藏复本及可借数量

### 3.5 统计报表 (Admin)

- 借阅排行（热门图书 Top 20、活跃读者 Top 20）
- 馆藏分析（分类分布、流通率、呆滞图书）
- 罚款统计（月度罚款总额、未缴清列表）
- 支持导出 CSV

### 3.6 通知系统

- 还书提醒（到期前 3 天、逾期当日）
- 预约到书通知
- 通知方式：系统内消息 + 邮件

## 4. 非功能需求

| 维度 | 要求 |
|------|------|
| 数据一致性 | 借还操作事务保护，库存数强一致 |
| 安全 | JWT 认证，RBAC 权限控制，SQL 注入防护 |

## 5. 技术约束

- 后端：Spring Boot 或 Node.js，RESTful API
- 数据库：SQLite（单文件，零配置，事务支持）
- 缓存：无（直接查库即可，不引入 Redis）
- 前端：Vue 3 + Element Plus
  - 额外依赖：ECharts（图表）、Vue Router、Pinia
- 部署：后端单进程启动，前端 dev server 或静态文件，能拉起即可，不要求容器化
- 启动后验收标准：前端页面可访问、后端 API 返回 200、数据库文件已初始化
- 项目根目录必须包含 `README.md`，GitHub 风格，内容覆盖：项目简介、技术栈、模块结构、本地启动步骤、API 概览

## 6. 前端设计规范

### 6.1 布局

- 后台管理型布局：左侧可折叠暗色导航（240px → 64px），右侧内容区
- 导航菜单按角色动态渲染（读者只看到检索/借阅记录；馆员看到图书管理/借还/读者管理；管理员看到全部）
- 顶部栏：系统 Logo + 名称（"墨香·图书馆"）、消息铃铛（未读数 badge）、用户头像下拉（个人中心/退出）
- 内容区使用面包屑 + 页面标题 + 卡片式 Body，底部版权栏年份动态

### 6.2 配色与视觉

- 主色：藏蓝 #1E3A5F（沉稳、学术感），辅助色：暖白 #FAFBFD（背景）、墨绿 #2E7D32（成功/在馆）、茜红 #C62828（逾期/警告）
- 卡片阴影 `box-shadow: 0 2px 12px rgba(0,0,0,.06)`，圆角 8px
- 表格行 hover 高亮，斑马纹间隔
- 所有操作按钮有 loading 态，防止重复提交
- 空状态用插画占位 + 引导文案（如"还没有借阅记录，去发现好书吧"）

### 6.3 首页仪表盘 (所有角色)

- 欢迎区：左侧 "早安/下午好，{姓名}" + 日期天气组件，右侧快捷操作卡片（扫码借还 / 检索）
- 数据卡片行（仅管理员/馆员）：今日借阅量、在馆人数、逾期未还数、待处理预约数（带环比箭头）
- 日历卡片：标记读者本人的到期日（红点）+ 续借截止日
- 最近借阅列表：封面缩略图 + 书名 + 借阅日期 + 剩余天数进度条（< 3 天变红）

### 6.4 图书检索页 (所有角色)

- 顶部搜索栏居中大输入框（800px 宽），带筛选展开面板（馆藏地下拉、在馆状态 Switch、出版年份范围滑块）
- 结果卡片网格（3 列）：封面图、书名、作者、出版社、索书号、可借数/复本数（绿色/灰色标签）、[预约] 按钮
- 点击卡片进详情抽屉：完整书目信息 + 馆藏复本明细表（条码、馆藏地、状态）
- 空搜索提示热门检索词标签云

### 6.5 借还操作页 (馆员)

- 双栏布局：左侧读者区（扫描读者证 → 显示头像/姓名/可借余量/当前借阅列表），右侧图书区（扫描条码 → 显示封面/书名/状态）
- 扫描识别成功后绿色脉冲动画反馈；异常信息红色抖动 + 提示音
- 借书成功打印小票风格的成功卡片（可 Ctrl+P）
- 还书时逾期自动弹出罚款对话框（金额、天数、收款确认按钮）

### 6.6 统计看板 (管理员)

- ECharts 驱动的可视化图表：
  - 借阅趋势折线图（近 12 个月，可切换周/月）
  - 分类分布玫瑰图（中图法大类，可下钻到二级）
  - 借阅排行横向条形图 Top 10
  - 流通率仪表盘
- 支持日期范围选择器，数据卡片均带同比/环比

### 6.7 响应式与体验

- 断点：≥1440px 三栏、≥1024px 两栏、<768px 移动端单栏 + 底部 TabBar
- 表格在移动端转为卡片列表
- 全局水印：当前用户学工号（防截图泄露）
- 网络断开时顶部出现 "网络连接异常" 警告条，恢复后 3 秒自动消失
- 所有表单实时校验，错误信息行内提示；提交后 Toast 通知（成功绿 / 失败红）

## 7. 核心业务流程

```
借书: 验证读者状态 → 检查借阅上限 → 检查罚款 → 更新库存 → 写借阅记录
还书: 查找借阅记录 → 计算超期 → (逾期)生成罚款单 → 恢复库存 → 检查预约队列
续借: 验证续借资格 → 未逾期 & 未达续借上限 & 无预约 → 延长归还日期
预约: 检查图书已借出 → 加入预约队列 → 还书时触发通知
```

## 8. 验收用例（关键路径）

| 编号 | 场景 | 预期结果 |
|------|------|----------|
| AC-01 | 读者借阅在馆图书 | 库存 -1，生成借阅记录 |
| AC-02 | 读者超借阅上限借书 | 提示超限，拒绝借阅 |
| AC-03 | 读者有未缴罚款借书 | 提示先缴罚款，拒绝借阅 |
| AC-04 | 归还逾期图书 | 库存 +1，生成罚款单(超期天数×0.1) |
| AC-05 | 续借成功 | 归还日期延长 50%，续借次数 +1 |
| AC-06 | 预约图书归还 | 库存不恢复，通知预约者，保留 3 天 |
| AC-07 | 管理员冻结账号后借书 | 拒绝借阅，提示账号异常 |
| AC-08 | 检索 "数据结构" | 返回匹配结果，分页正确，在馆数量准确 |
| AC-09 | 并发借同一图书最后一册 | 仅一人成功，另一人提示库存不足 |
| AC-10 | ISBN 自动录入 | 输入有效 ISBN，自动填充书名作者出版社 |
'''

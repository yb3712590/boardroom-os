[scenario]
scenario_id = "library-management"
display_name = "Library Management Scenario Stage Tests"

[input]
north_star_goal = "实现一个完全匿名、单机运行的极简图书流转终端，只回答馆里有什么书以及这本书现在能不能拿走。"
hard_constraints = [
  "系统固定为匿名、单机、单租户。",
  "唯一数据模型只允许 books 一张表，字段固定为 id、title、author、status。",
  "status 只允许 IN_LIBRARY 和 CHECKED_OUT。",
  "核心动作只允许 Add、Check Out、Return、Remove。",
  "禁止 Auth、RBAC、预约、罚金、借阅历史、分类表、标签表。",
  "界面固定为高信息密度 terminal/console 风格。"
]
read_only_context_refs = [
  "doc/tests/intergration-test-007-20260422.md"
]
workflow_profile = "CEO_AUTOPILOT_FINE_GRAINED"
force_requirement_elicitation = false

[runtime]
seed = 17
max_ticks = 900
timeout_sec = 7200
maintenance_interval_sec = 1
scheduler_max_dispatches = 20
resume_enabled = true

[layout]
runtime_db = "runtime/state.db"
events_log = "runtime/events.log"
runtime_blobs_dir = "runtime/blobs"
audit_records_dir = "audit/records"
audit_views_dir = "audit/views"
audit_stage_views_dir = "audit/views/stage-views"
workspace_dir_pattern = "workspace/wf_{workflow_id}"
workspace_metadata_dir = "workspace/wf_{workflow_id}/.metadata"
debug_compile_dir = "debug/compile"
debug_logs_dir = "debug/logs"
runtime_provider_config = "runtime/runtime-provider-config.json"
artifact_uploads_dir = "runtime/blobs/uploads"
ticket_context_archive_dir = "audit/records/nodes/ticket-context-archives"

[provider.default]
provider_id = "prov_openai_compat_truerealbill"
base_url = "http://codex.truerealbill.com:11234/v1"
api_key_env = "BOARDROOM_OS_SCENARIO_LIBRARY_API_KEY"
preferred_model = "gpt-5.4"
max_context_window = 270000
reasoning_effort = "high"
timeout_sec = 480
connect_timeout_sec = 10
write_timeout_sec = 20
first_token_timeout_sec = 300
stream_idle_timeout_sec = 300
request_total_timeout_sec = 480
retry_backoff_schedule_sec = [1, 2, 4, 8, 16, 32, 60, 60, 60]
fallback_provider_ids = []

[[provider.role_bindings]]
target_ref = "ceo_shadow"
provider_model_entry_refs = ["prov_openai_compat_truerealbill::gpt-5.4"]
max_context_window_override = 270000
reasoning_effort_override = "high"

[[provider.role_bindings]]
target_ref = "role_profile:architect_primary"
provider_model_entry_refs = ["prov_openai_compat_truerealbill::gpt-5.4"]
max_context_window_override = 270000
reasoning_effort_override = "xhigh"

[[provider.role_bindings]]
target_ref = "role_profile:frontend_engineer_primary"
provider_model_entry_refs = ["prov_openai_compat_truerealbill::gpt-5.4"]
max_context_window_override = 220000
reasoning_effort_override = "high"

[[provider.role_bindings]]
target_ref = "role_profile:checker_primary"
provider_model_entry_refs = ["prov_openai_compat_truerealbill::gpt-5.4"]
max_context_window_override = 220000
reasoning_effort_override = "high"

[seeds.stage_01_requirement_to_architecture]
path = "data/scenario-tests/library-management/seeds/stage_01_requirement_to_architecture/scenario"
description = "需求输入到 architecture_brief 的阶段种子。"
requires_prepared_state = false

[seeds.stage_02_outline_to_detailed_design]
path = "data/scenario-tests/library-management/seeds/stage_02_outline_to_detailed_design/scenario"
description = "概要设计到 detailed_design 的阶段种子。"
requires_prepared_state = true

[seeds.stage_03_detailed_design_to_backlog]
path = "data/scenario-tests/library-management/seeds/stage_03_detailed_design_to_backlog/scenario"
description = "详细设计到 backlog_recommendation 的阶段种子。"
requires_prepared_state = true

[seeds.stage_04_book_module_build_review]
path = "data/scenario-tests/library-management/seeds/stage_04_book_module_build_review/scenario"
description = "book 模块编码到 review gate 的阶段种子。"
requires_prepared_state = true

[seeds.stage_05_closeout_mainline_merge]
path = "data/scenario-tests/library-management/seeds/stage_05_closeout_mainline_merge/scenario"
description = "closeout 与主线合并阶段种子。"
requires_prepared_state = true

[seeds.stage_06_parallel_git_fanout_merge]

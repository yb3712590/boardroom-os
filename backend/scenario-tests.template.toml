seed_ref = "stage_01_requirement_to_architecture"
start_mode = "copy_seed"
checkpoint_kind = "requirement_to_architecture"
expected_stage = "plan"
expected_outputs = [
  "audit/records/manifest.json",
  "audit/views/workflow-summary.md",
  "audit/views/dag-visualization.dot",
  "audit/views/stage-views/stage_01_requirement_to_architecture.md"
]
